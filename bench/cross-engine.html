<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>running</title></head>
<body><pre id="r">running...</pre>
<script type="module">
  const report = (txt) => {
    document.getElementById('r').textContent = txt;
    document.title = txt.slice(0, 80);
    const img = new Image();
    img.src = '/bench-report?d=' + encodeURIComponent(txt) + '&t=' + Date.now();
  };
  try {
    const { loadGoeteia } = await import('./rt/web.mjs');
    const ua = navigator.userAgent.includes('Chrome') ? 'chrome'
             : navigator.userAgent.includes('Safari') ? 'safari' : 'other';
    const results = {};
    for (const v of ['old', 'new']) {
      globalThis.__bench = '';
      report(ua + ' loading ' + v);
      await loadGoeteia(`bench-${v}.wasm`);
      results[v] = globalThis.__bench;
      report(ua + ' ' + v.toUpperCase() + ' ' + results[v]);
    }
    report(ua + ' OLD ' + results.old + ' | NEW ' + results.new);
  } catch (e) {
    report('ERROR ' + (e && e.message ? e.message : String(e)));
  }
</script></body></html>
