<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manual — Goeteia</title>
    <meta name="description" content="The Goeteia manual — the self-hosting Scheme-to-WebAssembly compiler, rendered from docs/manual.md.">
    <style>
      :root {
        --bg: #f2f4fa;
        --bg2: #ffffff;
        --ink: #14203a;
        --dim: #566080;
        --lapis: #1550c4;
        --azure: #4788ee;
        --green: #1e7d34;
        --line: #dbe2ee;
        --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--ink);
        font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
        line-height: 1.65;
      }
      a { color: var(--lapis); text-decoration: none; }
      a:hover { text-decoration: underline; }
      .wrap { max-width: 52em; margin: 0 auto; padding: 0 1.2em; }

      /* top navigation bar */
      .nav {
        position: sticky; top: 0; z-index: 20;
        background: rgba(255,255,255,.82);
        backdrop-filter: saturate(1.2) blur(10px);
        -webkit-backdrop-filter: saturate(1.2) blur(10px);
        border-bottom: 1px solid var(--line);
      }
      .nav-inner {
        display: flex; align-items: center; justify-content: space-between;
        height: 3.4em; max-width: 60em;
      }
      .brand {
        font-weight: 700; font-size: 1.15em; color: var(--lapis);
        letter-spacing: .01em;
      }
      .brand:hover { text-decoration: none; }
      .nav-links { display: flex; gap: 1.5em; align-items: center; }
      .nav-links a { color: var(--dim); font-size: .92em; }
      .nav-links a:hover, .nav-links a.active { color: var(--lapis); text-decoration: none; }
      .nav-links a.gh {
        border: 1px solid var(--line); border-radius: 6px;
        padding: .3em .9em; color: var(--ink);
      }
      .nav-links a.gh:hover { border-color: var(--lapis); }
      @media (max-width: 42em) {
        .nav-links a.sec { display: none; }
      }

      /* rendered markdown */
      .doc { padding: 3em 0 4em; }
      .doc h1, .doc h2, .doc h3, .doc h4 {
        font-weight: 650; line-height: 1.25; margin: 1.6em 0 .6em;
      }
      .doc h1 {
        font-size: 2.4em; margin-top: .2em;
        background: linear-gradient(120deg, var(--lapis), var(--azure));
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .doc h2 { font-size: 1.6em; padding-bottom: .25em; border-bottom: 1px solid var(--line); }
      .doc h3 { font-size: 1.25em; }
      .doc h4 { font-size: 1.05em; color: var(--dim); }
      .doc p, .doc li { color: var(--ink); }
      .doc a { color: var(--lapis); }
      .doc ul, .doc ol { padding-left: 1.4em; }
      .doc li { margin: .25em 0; }
      .doc code {
        font-family: var(--mono); font-size: .9em; color: var(--lapis);
        background: #eef1f9; padding: .12em .4em; border-radius: 5px;
      }
      .doc pre {
        background: #eef1f9; border: 1px solid var(--line);
        padding: .9em 1em; border-radius: 8px; overflow-x: auto;
        font-family: var(--mono); font-size: 13.5px; line-height: 1.5;
      }
      .doc pre code { color: var(--ink); background: none; padding: 0; font-size: inherit; }
      .doc blockquote {
        margin: 1em 0; padding: .2em 1em; color: var(--dim);
        border-left: 3px solid var(--azure); background: var(--bg2);
        border-radius: 0 8px 8px 0;
      }
      .doc hr { border: none; border-top: 1px solid var(--line); margin: 2em 0; }
      .doc table {
        border-collapse: collapse; width: 100%; margin: 1.2em 0; font-size: .95em;
      }
      .doc th, .doc td { border: 1px solid var(--line); padding: .5em .8em; text-align: left; }
      .doc th { background: var(--bg2); font-weight: 600; }
      .doc img { max-width: 100%; }
      .doc :target { scroll-margin-top: 4.5em; }

      .status { padding: 4em 0; text-align: center; color: var(--dim); }
      .status code { font-family: var(--mono); }

      footer {
        padding: 2.5em 0 3.5em; border-top: 1px solid var(--line);
        text-align: center; color: var(--dim); font-size: .9em;
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <div class="wrap nav-inner">
        <a class="brand" href="index.html">Goeteia</a>
        <div class="nav-links">
          <a class="sec" href="why.html">Why Scheme?</a>
          <a class="sec active" href="manual.html">Manual</a>
          <a class="sec" href="agent.html">Agents</a>
          <a class="gh" href="https://github.com/guenchi/Goeteia">GitHub</a>
        </div>
      </div>
    </nav>

    <div class="wrap">
      <article id="doc" class="doc">
        <div class="status">loading the manual…</div>
      </article>
      <footer>
        Goeteia · MIT license ·
        <a href="https://github.com/guenchi/Goeteia">GitHub</a>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script>
      const doc = document.getElementById('doc');
      const SRC = 'docs/manual.md';

      function fail(msg) {
        doc.innerHTML =
          '<div class="status">' + msg +
          '<br><br>You can read it directly at <code>' + SRC + '</code>.</div>';
      }

      fetch(SRC)
        .then(r => {
          if (!r.ok) throw new Error('http ' + r.status);
          return r.text();
        })
        .then(md => {
          if (typeof marked === 'undefined') {
            // renderer failed to load (offline / blocked): show the raw text
            const pre = document.createElement('pre');
            pre.textContent = md;
            doc.replaceChildren(pre);
            return;
          }
          marked.setOptions({ gfm: true, breaks: false });
          doc.innerHTML = marked.parse(md);
          // jump to an in-page anchor if the URL carries one
          if (location.hash) {
            const el = document.getElementById(location.hash.slice(1));
            if (el) el.scrollIntoView();
          }
        })
        .catch(() => fail('The manual isn’t available yet.'));
    </script>
  </body>
</html>
