<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Goeteia playground</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: -apple-system, system-ui, sans-serif;
        max-width: 52em; margin: 2em auto; padding: 0 1em;
      }
      h1 { font-size: 1.4em; }
      h1 small { font-weight: normal; opacity: .6; font-size: .65em; }
      textarea {
        width: 100%; box-sizing: border-box;
        font-family: ui-monospace, Menlo, monospace; font-size: 14px;
        padding: .6em; border-radius: 6px;
      }
      pre {
        background: rgba(127,127,127,.12); padding: .8em;
        border-radius: 6px; min-height: 2em; white-space: pre-wrap;
        font-size: 14px;
      }
      button { font-size: 15px; padding: .35em 1.6em; border-radius: 6px; }
      select { font-size: 14px; padding: .3em; border-radius: 6px; }
      .bar { display: flex; gap: .8em; align-items: center; margin: .8em 0; }
      .note { opacity: .6; font-size: .85em; }
    </style>
  </head>
  <body>
    <h1>Goeteia playground
      <small>Scheme → WebAssembly GC, compiled by the compiler compiled by itself</small>
    </h1>
    <p class="note">
      The compiler is <code>goeteia.wasm</code> — a Wasm module —
      running right here in your browser.  No server, no JS compiler.
      Program result is the last expression; Ctrl/⌘-Enter runs.
    </p>
    <textarea id="src" rows="16" spellcheck="false"></textarea>
    <div class="bar">
      <button id="run">Run</button>
      <label>examples:
        <select id="examples"></select>
      </label>
    </div>
    <pre id="out"></pre>
    <script type="module" src="playground.js"></script>
  </body>
</html>
