<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Goeteia — bloom</title>
    <style>
      body { font-family: system-ui; text-align: center; margin-top: 2em; background: #f2f4fa; color: #14203a; }
      canvas { border-radius: 12px; box-shadow: 0 4px 20px rgba(16,20,42,.2); }
      code { font-family: ui-monospace, Menlo, monospace; color: #1550c4; }
    </style>
  </head>
  <body>
    <h1>Bloom</h1>
    <p>The classic post chain: scene → luminance threshold at half
    resolution → separable gaussian, ping-ponged twice → additive
    composite.  Five passes through <code>fx-target!</code>s, one
    command buffer per frame.  Needs WebGL&nbsp;2.
    See <code>fx-bloom.ss</code>.</p>
    <canvas id="c" width="800" height="600"></canvas>
    <script type="module">
      import { loadGoeteia } from '../rt/web.mjs';
      loadGoeteia('fx-bloom.wasm');
    </script>
  </body>
</html>
