<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Goeteia — depth of field</title>
    <style>
      body { font-family: system-ui; text-align: center; margin-top: 2em; background: #f2f4fa; color: #14203a; }
      canvas { border-radius: 12px; box-shadow: 0 4px 20px rgba(16,20,42,.2); }
      code { font-family: ui-monospace, Menlo, monospace; color: #1550c4; }
    </style>
  </head>
  <body>
    <h1>Depth of field</h1>
    <p>The scene renders lit and as linear depth; <code>(gfx post)</code>'s
    <code>dof-run!</code> mixes each pixel toward a half-resolution blur
    of the scene by its distance from the focal plane, which breathes
    between the near and far spheres.  Needs WebGL&nbsp;2.
    See <code>fx-dof.ss</code>.</p>
    <canvas id="c" width="800" height="600"></canvas>
    <script type="module">
      import { loadGoeteia } from '../rt/web.mjs';
      loadGoeteia('fx-dof.wasm');
    </script>
  </body>
</html>
