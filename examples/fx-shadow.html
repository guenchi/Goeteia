<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Goeteia — shadow mapping</title>
    <style>
      body { font-family: system-ui; text-align: center; margin-top: 2em; background: #f2f4fa; color: #14203a; }
      canvas { border-radius: 12px; box-shadow: 0 4px 20px rgba(16,20,42,.2); }
      code { font-family: ui-monospace, Menlo, monospace; color: #1550c4; }
    </style>
  </head>
  <body>
    <h1>Shadow mapping</h1>
    <p>Two passes: the boxes render into a depth-only
    <code>fx-target!</code> from the light's orthographic view
    (<code>m4-ortho</code>); the scene then reprojects each fragment
    into light space and compares depths.  Boxes shadow the ground
    and each other.  Needs WebGL&nbsp;2.
    See <code>fx-shadow.ss</code>.</p>
    <canvas id="c" width="800" height="600"></canvas>
    <script type="module">
      import { loadGoeteia } from '../rt/web.mjs';
      loadGoeteia('fx-shadow.wasm');
    </script>
  </body>
</html>
