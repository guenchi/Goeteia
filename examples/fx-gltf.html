<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Goeteia — a real GLB asset, loaded and lit</title>
    <style>
      body { font-family: system-ui; text-align: center; margin-top: 2em; background: #f2f4fa; color: #14203a; }
      canvas { border-radius: 12px; box-shadow: 0 4px 20px rgba(16,20,42,.2); }
      code { font-family: ui-monospace, Menlo, monospace; color: #1550c4; }
    </style>
  </head>
  <body>
    <h1>A real asset: Box.glb</h1>
    <p>The Khronos <code>Box.glb</code> sample (CC0), fetched and
    parsed by <code>(web gltf)</code>: the binary chunk lands in the
    shared linear memory and accessors read floats straight out of it.
    Geometry, node transform and the material's base color all come
    from the file. See <code>fx-gltf.ss</code>.</p>
    <canvas id="c" width="800" height="600"></canvas>
    <script type="module">
      import { loadGoeteia } from '../rt/web.mjs';
      loadGoeteia('fx-gltf.wasm');
    </script>
  </body>
</html>
