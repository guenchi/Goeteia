<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Goeteia — debug loader</title>
    <style>
      body { font-family: system-ui; text-align: center; margin-top: 1em; background: #14203a; color: #dce4f2; }
      canvas { border-radius: 12px; }
      pre { text-align: left; max-width: 800px; margin: 1em auto; padding: 1em;
            background: #0b1226; color: #ff9d9d; border-radius: 8px;
            white-space: pre-wrap; font-size: 12px; min-height: 3em; }
      code { color: #8fb4ff; }
    </style>
  </head>
  <body>
    <h3>debug loader: <code id="which"></code></h3>
    <canvas id="c" width="800" height="600"></canvas>
    <pre id="log">(no errors yet)</pre>
    <script type="module">
      const pre = document.getElementById('log');
      let first = true;
      const say = (...a) => {
        const line = a.map(x => (x && x.stack) ? x.stack : String(x)).join(' ');
        if (first) { pre.textContent = ''; first = false; }
        if (pre.textContent.length < 20000) pre.textContent += line + '\n';
      };
      window.onerror = (m, s, l, c, e) => say('[onerror]', m, s + ':' + l, e || '');
      window.onunhandledrejection = (e) => say('[rejection]', e.reason);
      const err = console.error.bind(console);
      console.error = (...a) => { say('[console.error]', ...a); err(...a); };
      const warn = console.warn.bind(console);
      console.warn = (...a) => { say('[console.warn]', ...a); warn(...a); };

      const wasm = new URLSearchParams(location.search).get('wasm') || 'fx-ssao.wasm';
      document.getElementById('which').textContent = wasm;
      say('[info] loading ' + wasm + ' — ' + navigator.userAgent.slice(0, 80));
      const t0 = performance.now();
      const ms = () => (performance.now() - t0).toFixed(0) + 'ms';
      // count rAF frames so a running loop is visible
      let frames = 0;
      const raf = window.requestAnimationFrame.bind(window);
      window.requestAnimationFrame = (f) => raf((ts) => {
        if (++frames === 1) say('[info] first frame at ' + ms());
        if (frames === 60) say('[info] 60 frames at ' + ms());
        return f(ts);
      });
      try {
        const { loadGoeteia } = await import('../rt/web.mjs');
        say('[info] runtime imported at ' + ms());
        await loadGoeteia(wasm);
        say('[info] wasm instantiated + started at ' + ms());
        // poll the GL error state for the first few seconds
        const gl = document.getElementById('c').getContext('webgl2');
        let polls = 0;
        const poll = setInterval(() => {
          if (gl) { const e = gl.getError(); if (e) say('[glGetError] 0x' + e.toString(16)); }
          if (++polls > 20) clearInterval(poll);
        }, 250);
      } catch (e) { say('[load failed]', e); }
    </script>
  </body>
</html>
