<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Goeteia — picking</title>
    <style>
      body { font-family: system-ui; text-align: center; margin-top: 2em; background: #f2f4fa; color: #14203a; }
      canvas { border-radius: 12px; box-shadow: 0 4px 20px rgba(16,20,42,.2); }
      code { font-family: ui-monospace, Menlo, monospace; color: #1550c4; }
    </style>
  </head>
  <body>
    <h1>Picking: the cursor casts a ray</h1>
    <p><code>m4-inverse</code> turns the view-projection inside out,
    <code>m4-unproject</code> pushes the mouse through the near and
    far planes, and <code>ray-aabb</code> answers which box the ray
    meets first.  Hover to highlight, click to keep.
    See <code>fx-pick.ss</code>.</p>
    <canvas id="c" width="800" height="600"></canvas>
    <script type="module">
      import { loadGoeteia } from '../rt/web.mjs';
      loadGoeteia('fx-pick.wasm');
    </script>
  </body>
</html>
