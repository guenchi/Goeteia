<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Goeteia — render-to-texture post-processing</title>
    <style>
      body { font-family: system-ui; text-align: center; margin-top: 2em; background: #f2f4fa; color: #14203a; }
      canvas { border-radius: 12px; box-shadow: 0 4px 20px rgba(16,20,42,.2); }
      code { font-family: ui-monospace, Menlo, monospace; color: #1550c4; }
    </style>
  </head>
  <body>
    <h1>Post-processing</h1>
    <p>The lit scene renders into an offscreen <code>fx-target!</code>;
    a fullscreen pass samples it back with a ripple and a vignette.
    Render-to-texture is the door to shadows, bloom and every
    screen-space effect. Needs WebGL&nbsp;2.
    See <code>fx-post.ss</code>.</p>
    <canvas id="c" width="800" height="600"></canvas>
    <script type="module">
      import { loadGoeteia } from '../rt/web.mjs';
      loadGoeteia('fx-post.wasm');
    </script>
  </body>
</html>
