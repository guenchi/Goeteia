<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Goeteia × Three.js — a spinning cube</title>
    <style>
      body { font-family: system-ui; text-align: center; margin-top: 2em; background: #f2f4fa; color: #14203a; }
      #app canvas { border-radius: 12px; box-shadow: 0 4px 20px rgba(16,20,42,.15); }
      code { font-family: ui-monospace, Menlo, monospace; color: #1550c4; }
    </style>
  </head>
  <body>
    <h1>Goeteia × Three.js</h1>
    <p>The scene below is declared in Scheme — see <code>three-spin.ss</code>.
    The graph is built once; per frame only two rotation signals cross the bridge.</p>
    <div id="app"></div>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
      import * as THREE from 'three';
      globalThis.THREE = THREE;                 // (web three) looks here
      const { loadGoeteia } = await import('../rt/web.mjs');
      loadGoeteia('three-spin.wasm');
    </script>
  </body>
</html>
