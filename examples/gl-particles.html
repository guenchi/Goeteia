<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Goeteia — 10,000 particles over a command buffer</title>
    <style>
      body { font-family: system-ui; text-align: center; margin-top: 2em; background: #f2f4fa; color: #14203a; }
      canvas { border-radius: 12px; box-shadow: 0 4px 20px rgba(16,20,42,.2); }
      code { font-family: ui-monospace, Menlo, monospace; color: #1550c4; }
    </style>
  </head>
  <body>
    <h1>10,000 particles, raw WebGL</h1>
    <p>Scheme updates every particle in the shared linear memory
    (unboxed floats, zero allocation) and encodes the frame as a
    command buffer — <em>one</em> bridge call per frame replays it.
    No Three.js. See <code>gl-particles.ss</code>.</p>
    <canvas id="c" width="800" height="600"></canvas>
    <script type="module">
      import { loadGoeteia } from '../rt/web.mjs';
      loadGoeteia('gl-particles.wasm');
    </script>
  </body>
</html>
