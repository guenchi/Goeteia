<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Goeteia — textured, lit parametric meshes</title>
    <style>
      body { font-family: system-ui; text-align: center; margin-top: 2em; background: #f2f4fa; color: #14203a; }
      canvas { border-radius: 12px; box-shadow: 0 4px 20px rgba(16,20,42,.2); }
      code { font-family: ui-monospace, Menlo, monospace; color: #1550c4; }
    </style>
  </head>
  <body>
    <h1>Textured meshes</h1>
    <p>Every <code>(gfx mesh)</code> generator carries parametric
    texture coordinates; <code>mesh-tex-vs/-fs</code> samples them
    under the same directional light.  The checkerboard is painted on
    a 2d canvas in Scheme — no asset files.
    See <code>fx-tex.ss</code>.</p>
    <canvas id="c" width="800" height="600"></canvas>
    <script type="module">
      import { loadGoeteia } from '../rt/web.mjs';
      loadGoeteia('fx-tex.wasm');
    </script>
  </body>
</html>
